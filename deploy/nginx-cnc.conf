# CNC Plan & Process Pro - nginx site config
# Install to /etc/nginx/sites-available/cnc, symlink into sites-enabled.
# Replace SERVER_NAME_HERE with your domain or <ip-with-dashes>.sslip.io
# (certbot rewrites this file for HTTPS when you run it).

server {
    listen 80;
    server_name SERVER_NAME_HERE;

    # Tester gate: every page and API call needs a username + password.
    # Manage users with:  sudo htpasswd /etc/nginx/.htpasswd_cnc <user>
    auth_basic "CNC Plan & Process Pro - testers";
    auth_basic_user_file /etc/nginx/.htpasswd_cnc;

    # STEP uploads can be large (backend caps at 200 MB)
    client_max_body_size 210m;

    # Frontend: static production build
    root /home/cnc/app/frontend/dist;
    index index.html;
    location / {
        try_files $uri /index.html;
    }

    # Engine API: analysis takes ~90-120 s - keep proxies patient
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_request_buffering off;
    }
}
